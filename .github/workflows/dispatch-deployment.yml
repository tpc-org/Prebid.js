name: Trigger Base Bundle Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in tpc-org/prebid-deployments
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENTS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tpc-org/prebid-deployments/dispatches \
            -d '{
              "event_type": "deploy-base",
              "client_payload": {
                "sha": "${{ github.sha }}",
                "ref": "${{ github.ref }}",
                "actor": "${{ github.actor }}",
                "message": ${{ toJSON(github.event.head_commit.message) }}
              }
            }'

          echo "Dispatched deploy for SHA ${{ github.sha }}"
