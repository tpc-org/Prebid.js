name: Trigger Base Bundle Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in tpc-org/prebid-deployments
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          ACTOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          payload=$(jq -n \
            --arg sha     "$SHA" \
            --arg ref     "$REF" \
            --arg actor   "$ACTOR" \
            --arg message "$MESSAGE" \
            '{event_type: "deploy-base", client_payload: {sha: $sha, ref: $ref, actor: $actor, message: $message}}')

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENTS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tpc-org/prebid-deployments/dispatches \
            -d "$payload"

          echo "Dispatched deploy for SHA $SHA"
